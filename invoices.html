<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Tracker | Invoices</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <i class="fa-solid fa-file-invoice-dollar logo-icon"></i>
          <h2>Invoice Tracker</h2>
        </div>

        <nav class="sidebar-nav">
          <a href="index.html" class="nav-link">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
          </a>

          <a href="clients.html" class="nav-link">
            <i class="fa-solid fa-users"></i>
            <span>Clients</span>
          </a>

          <a href="invoices.html" class="nav-link active">
            <i class="fa-solid fa-file-invoice"></i>
            <span>Invoices</span>
          </a>
        </nav>

        <button id="toggleSidebar" class="toggle-btn"></button>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <header class="page-header">
          <h1>Invoice Management</h1>
          <p>Create, track and manage your invoices.</p>
        </header>

        <!-- Invoice Form -->
        <section class="card">
          <div class="section-header">
            <h2>Create Invoice</h2>
          </div>

          <form id="invoiceForm" class="form-grid">
            <div class="form-group">
              <label for="invoiceClient"> Client * </label>

              <select id="invoiceClient" required>
                <option value="">Select Client</option>
              </select>
            </div>

            <div class="form-group">
              <label for="serviceTitle"> Service Title * </label>

              <input
                type="text"
                id="serviceTitle"
                placeholder="Website Design"
                required
              />
            </div>

            <div class="form-group full-width">
              <label for="invoiceDescription"> Description </label>

              <textarea
                id="invoiceDescription"
                rows="4"
                placeholder="Service description"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="invoiceAmount"> Amount * </label>

              <input
                type="number"
                id="invoiceAmount"
                min="0"
                step="0.01"
                placeholder="500"
                required
              />
            </div>

            <div class="form-group">
              <label for="invoiceDate"> Date * </label>

              <input type="date" id="invoiceDate" required />
            </div>

            <input type="hidden" id="invoiceId" />

            <button type="submit" class="btn-primary" id="submitInvoiceBtn">
              <i class="fa-solid fa-plus"></i>
              Create Invoice
            </button>
          </form>
        </section>

        <!-- Sort Section -->
        <section class="card">
          <div class="section-header">
            <h2>Sort Invoices</h2>
          </div>

          <div class="sort-controls">
            <select id="sortInvoices">
              <option value="date">Date</option>

              <option value="amount">Amount</option>

              <option value="status">Status</option>
            </select>
          </div>
        </section>

        <!-- Invoice Table -->
        <section class="card">
          <div class="section-header">
            <h2>Invoice List</h2>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Client</th>
                  <th>Service</th>
                  <th>Amount</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="invoiceTableBody">
                <!-- JavaScript Render -->
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./js/invoices.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
