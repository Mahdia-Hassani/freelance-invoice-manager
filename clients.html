<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Tracker | Clients</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <i class="fa-solid fa-file-invoice-dollar logo-icon"></i>
          <h2>Invoice Tracker</h2>
        </div>

        <nav class="sidebar-nav">
          <a href="index.html" class="nav-link">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
          </a>

          <a href="clients.html" class="nav-link active">
            <i class="fa-solid fa-users"></i>
            <span>Clients</span>
          </a>

          <a href="invoices.html" class="nav-link">
            <i class="fa-solid fa-file-invoice"></i>
            <span>Invoices</span>
          </a>
        </nav>

        <button id="toggleSidebar" class="toggle-btn"></button>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Page Header -->
        <header class="page-header">
          <h1>Client Management</h1>
          <p>Manage your freelance clients and contact information.</p>
        </header>

        <!-- Add Client Form -->
        <section class="card">
          <div class="section-header">
            <h2>Add New Client</h2>
          </div>

          <form id="clientForm" class="form-grid">
            <div class="form-group">
              <label for="clientName">Name *</label>
              <input
                type="text"
                id="clientName"
                placeholder="Enter client name"
                required
              />
            </div>

            <div class="form-group">
              <label for="clientEmail">Email *</label>
              <input
                type="email"
                id="clientEmail"
                placeholder="Enter email address"
                required
              />
            </div>

            <div class="form-group">
              <label for="clientCompany">Company</label>
              <input
                type="text"
                id="clientCompany"
                placeholder="Company name"
              />
            </div>

            <div class="form-group full-width">
              <label for="clientNotes">Notes</label>
              <textarea
                id="clientNotes"
                rows="4"
                placeholder="Additional notes"
              ></textarea>
            </div>

            <input type="hidden" id="clientId" />

            <button type="submit" class="btn-primary" id="submitClientBtn">
              <i class="fa-solid fa-plus"></i>
              Add Client
            </button>
          </form>
        </section>

        <!-- Sort Controls -->
        <section class="card">
          <div class="section-header">
            <h2>Sort Clients</h2>
          </div>

          <div class="sort-controls">
            <select id="sortClients">
              <option value="name">Sort by Name</option>

              <option value="email">Sort by Email</option>

              <option value="company">Sort by Company</option>
            </select>
          </div>
        </section>

        <!-- Clients Table -->
        <section class="card">
          <div class="section-header">
            <h2>Client List</h2>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Company</th>
                  <th>Notes</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="clientsTableBody">
                <!-- JavaScript Render -->
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./js/clients.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
